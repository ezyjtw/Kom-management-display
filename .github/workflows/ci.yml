name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  NODE_VERSION: "20"

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run tests
        run: npm test

      - name: Check test coverage thresholds
        run: npm test -- --coverage --reporter=json 2>/dev/null || true

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Dependency audit (high + critical)
        run: npm audit --audit-level=high || true

      - name: Check for secrets in code
        run: |
          echo "Scanning for potential secrets..."
          if grep -rn --include='*.ts' --include='*.tsx' --include='*.js' \
            -E '(password|secret|api_key|apikey|token)\s*[:=]\s*["\x27][A-Za-z0-9+/]{20,}' \
            src/ --exclude-dir=node_modules --exclude-dir=.next 2>/dev/null | \
            grep -v 'process\.env' | grep -v '\.test\.' | grep -v 'type\s' | head -5; then
            echo "WARNING: Potential secrets found in source code"
            exit 1
          else
            echo "No secrets detected"
          fi

      - name: Validate CSP header is present
        run: |
          echo "Checking CSP header configuration..."
          if grep -q "Content-Security-Policy" next.config.js; then
            echo "CSP header found"
            # Verify no unsafe-eval
            if grep -q "unsafe-eval" next.config.js; then
              echo "ERROR: unsafe-eval found in CSP"
              exit 1
            fi
            echo "No unsafe-eval — CSP looks good"
          else
            echo "WARNING: No CSP header found in next.config.js"
          fi

      - name: Check for dual auth paths
        run: |
          echo "Checking for legacy auth paths..."
          # Ensure only auth-options.ts is used for auth, not a legacy src/lib/auth.ts
          if [ -f "src/lib/auth.ts" ]; then
            echo "ERROR: Legacy auth file src/lib/auth.ts still exists"
            exit 1
          fi
          echo "No legacy auth paths found"

  schema-check:
    name: Schema Validation
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema syntax
        run: npx prisma validate

      - name: Push schema to fresh database (migration smoke test)
        run: npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: "postgresql://test:test@localhost:5432/testdb"

      - name: Verify seed script exists
        run: |
          if [ -f "prisma/seed.ts" ] || [ -f "prisma/seed.js" ]; then
            echo "Seed script found"
          else
            echo "WARNING: No seed script found in prisma/"
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build Next.js
        run: npm run build
        env:
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"

      - name: Verify health endpoints exist
        run: |
          echo "Checking health endpoint files..."
          for f in src/app/api/health/route.ts src/app/api/health/liveness/route.ts src/app/api/health/readiness/route.ts; do
            if [ -f "$f" ]; then
              echo "  OK: $f"
            else
              echo "  MISSING: $f"
              exit 1
            fi
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/
          retention-days: 7

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: kommand-centre:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
