name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  NODE_VERSION: "20"

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run tests
        run: npm test

      - name: Check test coverage thresholds
        run: |
          npm test -- --coverage --coverageReporters=json-summary 2>&1 | tee coverage-output.txt
          # Fail if coverage drops below thresholds
          if [ -f coverage/coverage-summary.json ]; then
            node -e "
              const c = require('./coverage/coverage-summary.json').total;
              const thresholds = { lines: 50, branches: 40, functions: 45, statements: 50 };
              let failed = false;
              for (const [key, min] of Object.entries(thresholds)) {
                const pct = c[key].pct;
                if (pct < min) {
                  console.error('FAIL: ' + key + ' coverage ' + pct + '% is below threshold ' + min + '%');
                  failed = true;
                } else {
                  console.log('OK: ' + key + ' coverage ' + pct + '% >= ' + min + '%');
                }
              }
              if (failed) process.exit(1);
            "
          else
            echo "WARNING: Coverage summary not generated, skipping threshold check"
          fi

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Dependency audit (critical blocks, high warns)
        run: |
          # Fail on critical vulnerabilities
          npm audit --audit-level=critical 2>&1 || {
            echo ""
            echo "ERROR: Critical vulnerabilities found. Fix or add reviewed exceptions to .nsprc."
            exit 1
          }
          # Warn on high vulnerabilities (non-blocking)
          npm audit --audit-level=high 2>&1 || {
            echo ""
            echo "WARNING: High-severity vulnerabilities found. Review and fix when possible."
          }

      - name: Check for secrets in code
        run: |
          echo "Scanning for potential secrets..."
          MATCHES=$(grep -rn --include='*.ts' --include='*.tsx' --include='*.js' \
            -E '(password|secret|api_key|apikey|token)\s*[:=]\s*["\x27][A-Za-z0-9+/]{20,}' \
            src/ --exclude-dir=node_modules --exclude-dir=.next 2>/dev/null | \
            grep -v 'process\.env' | grep -v '\.test\.' | grep -v 'type\s' | \
            grep -v 'placeholder' | grep -v 'template' | grep -v 'example' | \
            grep -v 'password:' | grep -v 'Password' || true)
          if [ -n "$MATCHES" ]; then
            echo "$MATCHES" | head -5
            echo "WARNING: Potential secrets found in source code"
            exit 1
          else
            echo "No secrets detected"
          fi

      - name: Validate CSP header is present
        run: |
          echo "Checking CSP header configuration..."
          if grep -q "Content-Security-Policy" next.config.js; then
            echo "CSP header found"
            # Extract CSP value lines and check for unsafe-eval in actual directives (not comments)
            CSP_DIRECTIVES=$(grep -v '^\s*//' next.config.js | grep -oP "'[^']*'" | grep -i "unsafe-eval" || true)
            if [ -n "$CSP_DIRECTIVES" ]; then
              echo "ERROR: unsafe-eval found in CSP directive values"
              echo "$CSP_DIRECTIVES"
              exit 1
            fi
            echo "No unsafe-eval in CSP directives"
            # Verify frame-ancestors 'none' is present
            if grep -q "frame-ancestors" next.config.js; then
              echo "frame-ancestors directive found"
            else
              echo "WARNING: No frame-ancestors directive in CSP"
            fi
          else
            echo "ERROR: No CSP header found in next.config.js"
            exit 1
          fi

      - name: Check for dual auth paths
        run: |
          echo "Checking for legacy auth paths..."
          # Ensure only auth-options.ts is used for auth, not a legacy src/lib/auth.ts
          if [ -f "src/lib/auth.ts" ]; then
            echo "ERROR: Legacy auth file src/lib/auth.ts still exists"
            exit 1
          fi
          echo "No legacy auth paths found"

      - name: Verify authorization matrix completeness
        run: |
          echo "Checking authorization matrix covers all resources..."
          # Count roles defined in the matrix
          ROLE_COUNT=$(grep -c "^  \(admin\|lead\|employee\|auditor\):" src/modules/auth/types/index.ts || true)
          if [ "$ROLE_COUNT" -lt 4 ]; then
            echo "ERROR: Expected 4 roles in AUTHORIZATION_MATRIX, found $ROLE_COUNT"
            exit 1
          fi
          echo "All 4 roles defined in AUTHORIZATION_MATRIX"
          # Verify Resource type and matrix keys stay in sync
          RESOURCE_TYPE_COUNT=$(grep -cP '^\s+\| "' src/modules/auth/types/index.ts || true)
          echo "Resource type has $RESOURCE_TYPE_COUNT resources"

      - name: Verify scoring config workflow actions
        run: |
          echo "Checking config workflow actions are properly mapped..."
          # Ensure the PUT handler in scores/config/route.ts references all workflow actions
          for action in submit_review approve activate archive send_back; do
            if grep -q "$action" src/app/api/scores/config/route.ts; then
              echo "  OK: $action action found"
            else
              echo "  MISSING: $action action not found in config route"
              exit 1
            fi
          done
          echo "All workflow actions verified"

  schema-check:
    name: Schema Validation
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema syntax
        run: npx prisma validate
        env:
          DATABASE_URL: "postgresql://test:test@localhost:5432/testdb"

      - name: Push schema to fresh database (migration smoke test)
        run: npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: "postgresql://test:test@localhost:5432/testdb"

      - name: Verify seed script exists
        run: |
          if [ -f "prisma/seed.ts" ] || [ -f "prisma/seed.js" ]; then
            echo "Seed script found"
          else
            echo "WARNING: No seed script found in prisma/"
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test, schema-check]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build Next.js
        run: npm run build
        env:
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"

      - name: Verify health endpoints exist
        run: |
          echo "Checking health endpoint files..."
          for f in src/app/api/health/route.ts src/app/api/health/liveness/route.ts src/app/api/health/readiness/route.ts; do
            if [ -f "$f" ]; then
              echo "  OK: $f"
            else
              echo "  MISSING: $f"
              exit 1
            fi
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/
          retention-days: 7

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: kommand-centre:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
